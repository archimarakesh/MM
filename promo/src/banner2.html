<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1600px;height:900px;overflow:hidden;position:relative;font-family:'Manrope',sans-serif;
  background:#050505;color:#f3eee2;display:flex;align-items:center}
.orb1{position:absolute;width:1100px;height:1100px;top:-420px;right:-280px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,.17),transparent 65%)}
.orb2{position:absolute;width:900px;height:900px;bottom:-400px;left:-260px;border-radius:50%;
  background:radial-gradient(circle,rgba(120,20,40,.18),transparent 65%)}
.left{padding-left:110px;width:1010px;position:relative}
.logo-row{display:flex;align-items:center;gap:22px}
.logo-row img{width:86px}
.logo-row span{font-family:'Cinzel',serif;font-weight:700;font-size:30px;letter-spacing:.2em}
.h{font-family:'Cinzel',serif;font-weight:700;font-size:128px;line-height:1;margin-top:34px;
  background:linear-gradient(135deg,#f6dd8b,#d4af37 45%,#9e7514);-webkit-background-clip:text;background-clip:text;color:transparent}
.tag{font-size:32px;color:#b7ae98;margin-top:26px;line-height:1.5}
.stages{display:flex;align-items:center;gap:20px;margin-top:44px;font-size:44px}
.stages i{font-style:normal;opacity:.5;font-size:30px}
.pill{display:inline-block;margin-top:48px;border-radius:999px;padding:24px 52px;font-size:34px;font-weight:800;
  background:linear-gradient(135deg,#f0d47a,#c9971d);color:#140f03;box-shadow:0 20px 60px rgba(212,175,55,.35)}
.bot{margin-left:26px;font-size:26px;font-weight:800;color:#e8c96a}
.right{position:absolute;right:100px;top:50%;transform:translateY(-50%);text-align:center}
.right .rose{font-size:300px;line-height:1;filter:drop-shadow(0 30px 70px rgba(180,30,60,.45))}
.right .roi{font-family:'Cinzel',serif;font-weight:700;font-size:74px;color:#e8c96a;margin-top:8px}
.right .roi small{display:block;font-family:'Manrope',sans-serif;font-size:22px;color:#8d846f;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-top:6px}
</style></head><body>
<div class="orb1"></div><div class="orb2"></div>
<div class="left">
  <div class="logo-row"><img src="file:///D:/MM/logo.webp"><span><b style="color:#f59e2d">MAGIC</b> MARKET</span></div>
  <div class="h">E-GROWING</div>
  <div class="tag">Купи долю куста розы от 1 000 ₴ —<br>получи выплату после сбора урожая</div>
  <div class="stages">🌰 <i>→</i> 🌱 <i>→</i> 🌿 <i>→</i> 🌸 <i>→</i> 🌹 <i>→</i> 🧺</div>
  <div style="display:flex;align-items:center"><div class="pill">до +35% за цикл</div><div class="bot">@Magic_Marketplace_bot</div></div>
</div>
<div class="right">
  <div class="rose">🌹</div>
  <div class="roi">+35%<small>максимум · вход на семечке</small></div>
</div>
</body></html>
