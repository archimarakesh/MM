<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1600px;height:900px;overflow:hidden;position:relative;font-family:'Manrope',sans-serif;
  background:#050505;color:#f3eee2;display:flex;align-items:center}
.orb1{position:absolute;width:1100px;height:1100px;top:-400px;right:-300px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,.18),transparent 65%)}
.orb2{position:absolute;width:900px;height:900px;bottom:-400px;left:-250px;border-radius:50%;
  background:radial-gradient(circle,rgba(140,60,20,.15),transparent 65%)}
.left{padding-left:110px;width:960px;position:relative}
.wordmark{font-family:'Cinzel',serif;font-weight:700;font-size:64px;letter-spacing:.14em}
.m1{color:#f59e2d}.m2{color:#fff}
.tag{font-size:34px;color:#b7ae98;margin-top:26px;line-height:1.5}
.chips{display:flex;gap:16px;flex-wrap:wrap;margin-top:46px}
.chip{border:1px solid rgba(212,175,55,.35);background:rgba(212,175,55,.07);border-radius:999px;
  padding:16px 30px;font-size:24px;font-weight:700;color:#e8c96a}
.pill{display:inline-block;margin-top:52px;border-radius:999px;padding:24px 54px;font-size:34px;font-weight:800;
  background:linear-gradient(135deg,#f0d47a,#c9971d);color:#140f03;box-shadow:0 20px 60px rgba(212,175,55,.35)}
.right{position:absolute;right:60px;top:50%;transform:translateY(-50%);text-align:center}
.right img{width:430px;filter:drop-shadow(0 30px 80px rgba(212,175,55,.35))}
</style></head><body>
<div class="orb1"></div><div class="orb2"></div>
<div class="left">
  <div class="wordmark"><span class="m1">Magic</span> <span class="m2">Market</span></div>
  <div class="tag">Премиальный магазин и e-growing<br>в одном Telegram-приложении</div>
  <div class="chips">
    <div class="chip">🛍 Товары на вес</div>
    <div class="chip">🌹 E-growing</div>
    <div class="chip">📦 Новая Почта</div>
    <div class="chip">🤝 Рефералка до 10%</div>
  </div>
  <div class="pill">@Magic_Marketplace_bot</div>
</div>
<div class="right"><img src="file:///D:/MM/logo.webp"></div>
</body></html>
